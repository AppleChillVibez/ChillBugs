name: Bug Report
description: Report a bug in Chillio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting**, please search [existing issues](https://github.com/AppleChillVibez/ChillBugs/issues) to avoid duplicates.
        If your bug already exists, give it a thumbs up (👍) instead of creating a new one.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        # - iOS
        # - tvOS
        - Android
    validations:
      required: true

  - type: input
    id: user-id
    attributes:
      label: Your User ID
      description: "Found next to the version number at the bottom of Settings."
      placeholder: "e.g. 4KT72MX"
    validations:
      required: true
      pattern: '[A-Z0-9]{7}'
      pattern_error: "User ID must be 7 uppercase alphanumeric characters, e.g. 4KT72MX"

  - type: input
    id: report-id
    attributes:
      label: Report ID (optional)
      description: "If you sent logs, paste the Report ID shown in Settings → Get Help."
      placeholder: "e.g. RPT-abc123"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: App Version
      description: "Found at the bottom of Settings. Include the build number in parentheses."
      placeholder: "e.g. 10.0.0 (230)"
    validations:
      required: true
      pattern: '\d+\.\d+\.\d+\s*\(\d+\)'
      pattern_error: "Must be in format X.Y.Z (build), e.g. 10.0.0 (230)"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen recordings
      description: Add screenshots or recordings to help explain the problem.
    validations:
      required: true
