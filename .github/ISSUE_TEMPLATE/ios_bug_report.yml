name: iOS/tvOS Bug Report
description: Report a bug in Chillio for iPhone, iPad, Apple TV, or Mac
labels: ["bug", "ios"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting**, please search [existing issues](https://github.com/AppleChillVibez/ChillBugs/issues) to avoid duplicates.
        If your bug already exists, give it a thumbs up (👍) instead of creating a new one.

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - iPhone
        - iPad
        - Apple TV
        - Mac
    validations:
      required: true

  - type: input
    id: report-id
    attributes:
      label: Report ID
      description: "Paste the Report ID shown in Settings → Get Help after sending logs."
      placeholder: "e.g. RPT-abc123"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: "Found at the bottom of Settings."
      placeholder: "e.g. 5.14.2"
    validations:
      required: true
      pattern: '\d+\.\d+\.\d+'
      pattern_error: "Must be in format X.Y.Z, e.g. 5.14.2"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen recordings
      description: Add screenshots or recordings to help explain the problem.
    validations:
      required: true
