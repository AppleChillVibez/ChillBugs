name: Feature Request
description: Suggest a feature or improvement for Chillio
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting**, please search [existing issues](https://github.com/AppleChillVibez/ChillBugs/issues) to avoid duplicates.
        If your request already exists, give it a thumbs up (👍) to help us prioritize.

  - type: input
    id: user-id
    attributes:
      label: Your User ID
      description: "From the iOS TestFlight app: Settings → Manage Account → Add Account → Managed Account → ID (Android does not have Settings yet)"
      placeholder: "e.g. abc123-def456"
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - tvOS
        - All
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: How would this improve your experience?
    validations:
      required: false
